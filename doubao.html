<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="douabo-style.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="logo-banner">
                <img src="odin-lined.png" alt="Odin logo" class="logo-img">
                <span class="logo-text">ODIN</span>
            </div>
            <div class="photo-credit">
                Photo by <a href="https://unsplash.com/@hristodimitrov" target="_blank" rel="noopener noreferrer">Hristo Dimitrov</a> on <a href="https://unsplash.com" target="_blank" rel="noopener noreferrer">Unsplash</a>
            </div>
        </div>
        <div class="main">
            <div class="hero">
                <p class="hero-text">
                    This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.
                </p>
                <p class="hero-call">
                    You <em>know</em> you want to.
                </p>
            </div>
            <form action="#" method="post" class="signup-form">
                <div class="form-panel">
                    <h2 class="form-title">Let's do this!</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="first-name">FIRST NAME</label>
                            <input type="text" id="first-name" name="first_name" required>
                        </div>
                        <div class="form-group">
                            <label for="last-name">LAST NAME</label>
                            <input type="text" id="last-name" name="last_name" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">EMAIL</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">PHONE NUMBER</label>
                            <input type="tel" id="phone" name="phone">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="password">PASSWORD</label>
                            <input type="password" id="password" name="password" minlength="6" required>
                        </div>
                        <div class="form-group">
                            <label for="confirm-password">CONFIRM PASSWORD</label>
                            <input type="password" id="confirm-password" name="confirm_password" minlength="6" required>
                        </div>
                    </div>
                </div>
                <div class="form-footer">
                    <button type="submit" class="create-btn">Create Account</button>
                    <p class="login-prompt">Already have an account? <a href="#" class="login-link">Log in</a></p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
